<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagrama de Red XG-PON – Coopelesca</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #00a8cc 0%, #0891b2 50%, #0e7490 100%);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
    border-bottom: 4px solid #00a8cc;
    border-radius: 15px;
    padding: 30px;
  }
  .coopelesca-logo {
    color: #00a8cc;
    font-size: 2.4em;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,168,204,0.3);
  }
  .header h1 {
    color: #0e7490;
    font-size: 1.5em;
    margin-bottom: 5px;
  }
  .header h2 {
    color: #0891b2;
    font-size: 1.1em;
    font-weight: normal;
    margin-bottom: 10px;
  }
  .version-badge {
    background: linear-gradient(135deg, #00a8cc 0%, #0891b2 100%);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.9em;
    font-weight: bold;
    display: inline-block;
    margin-top: 10px;
  }

  /* ── DIAGRAM CARD ── */
  .diagram-card {
    background: white;
    border-radius: 15px;
    padding: 30px 24px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-top: 4px solid #00a8cc;
  }

  /* ── SVG DIAGRAM ── */
  .svg-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  svg.diagram {
    width: 100%;
    max-width: 860px;
    height: auto;
    overflow: visible;
  }

  /* ── LEGEND ── */
  .legend {
    margin-top: 28px;
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
    border: 1px solid #bae6fd;
    border-radius: 10px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #0e7490;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .legend-line {
    width: 52px;
    height: 3px;
    border-radius: 2px;
    position: relative;
  }
  .legend-line.copper { background: #f59e0b; }
  .legend-line.fiber  { background: #ef4444; }
  .legend-line::after {
    content: '';
    position: absolute;
    right: -1px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: inherit;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 35px;
    text-align: center;
    color: white;
    font-size: 1.1rem;
    line-height: 1.6;
  }

  /* ── NODE ANIMATIONS ── */
  @keyframes dash-flow-copper {
    to { stroke-dashoffset: -40; }
  }
  @keyframes dash-flow-fiber {
    to { stroke-dashoffset: -40; }
  }
  .link-copper-anim {
    stroke: #f59e0b;
    stroke-width: 2;
    fill: none;
    stroke-dasharray: 10 6;
    animation: dash-flow-copper 1.2s linear infinite;
    opacity: .55;
  }
  .link-fiber-anim {
    stroke: #ef4444;
    stroke-width: 2;
    fill: none;
    stroke-dasharray: 10 6;
    animation: dash-flow-fiber 1.2s linear infinite;
    opacity: .55;
  }
  .link-copper-base {
    stroke: #f59e0b;
    stroke-width: 2.5;
    fill: none;
    opacity: .9;
  }
  .link-fiber-base {
    stroke: #ef4444;
    stroke-width: 2.5;
    fill: none;
    opacity: .9;
  }

  @keyframes glow-teal {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(0,168,204,.3)); }
    50%       { filter: drop-shadow(0 0 10px rgba(0,168,204,.6)); }
  }
  .node-glow { animation: glow-teal 3s ease-in-out infinite; }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="coopelesca-logo">🌐 COOPELESCA R.L.</div>
    <h1>Proyecto Homologación X-GPON — ONT Nokia Modelo XS-010X-Q</h1>
    <h2>Topología de Prueba de Red</h2>
    <span class="version-badge">Proyecto de homologacion XG-PON · Unidad de Ingeniería</span>
  </div>

  <!-- DIAGRAM -->
  <div class="diagram-card">
    <div class="svg-wrap">
    <!--
      Layout (viewBox 0 0 860 580):
      SERVIDOR IPERF3    (130, 80)
      SWITCH RAISECOM    (430, 200)
      OLT NOKIA          (720, 80)
      ODN                (720, 300)
      ONT XS-010X-Q      (720, 450)
      CLIENTE IPERF3     (430, 540)
    -->
    <svg class="diagram" viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Radial glow gradient for nodes -->
        <radialGradient id="glow-teal" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#00a8cc" stop-opacity=".2"/>
          <stop offset="100%" stop-color="#00a8cc" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#ef4444" stop-opacity=".15"/>
          <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow-copper" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#f59e0b" stop-opacity=".15"/>
          <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
        </radialGradient>

        <!-- Arrow markers -->
        <marker id="arr-copper" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b" opacity=".9"/>
        </marker>
        <marker id="arr-fiber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#ef4444" opacity=".9"/>
        </marker>

        <!-- Node bg gradient – light theme -->
        <linearGradient id="node-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#f0f9ff"/>
          <stop offset="100%" stop-color="#e0f2fe"/>
        </linearGradient>
        <linearGradient id="olt-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#e0f2fe"/>
          <stop offset="100%" stop-color="#bae6fd"/>
        </linearGradient>
        <linearGradient id="odn-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#fff1f2"/>
          <stop offset="100%" stop-color="#fee2e2"/>
        </linearGradient>
      </defs>

      <!-- ═══════════════════════════════════════════
           LINKS – base lines
      ═══════════════════════════════════════════ -->

      <!-- SERVIDOR → SWITCH (copper) -->
      <line class="link-copper-base" x1="167" y1="115" x2="390" y2="192" marker-end="url(#arr-copper)"/>
      <line class="link-copper-anim" x1="167" y1="115" x2="390" y2="192"/>

      <!-- SWITCH → OLT (copper) -->
      <line class="link-copper-base" x1="470" y1="192" x2="683" y2="115" marker-end="url(#arr-copper)"/>
      <line class="link-copper-anim" x1="470" y1="192" x2="683" y2="115"/>

      <!-- OLT → ODN (fiber) -->
      <line class="link-fiber-base" x1="720" y1="134" x2="720" y2="272" marker-end="url(#arr-fiber)"/>
      <line class="link-fiber-anim" x1="720" y1="134" x2="720" y2="272"/>

      <!-- ODN → ONT (fiber) -->
      <line class="link-fiber-base" x1="720" y1="328" x2="720" y2="413" marker-end="url(#arr-fiber)"/>
      <line class="link-fiber-anim" x1="720" y1="328" x2="720" y2="413"/>

      <!-- ONT → CLIENTE (copper) -->
      <line class="link-copper-base" x1="680" y1="462" x2="468" y2="528" marker-end="url(#arr-copper)"/>
      <line class="link-copper-anim" x1="680" y1="462" x2="468" y2="528"/>

      <!-- link speed labels -->
      <g font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#0891b2" text-anchor="middle" font-weight="600">
        <text x="270" y="142" transform="rotate(-18,270,142)">10 GbE</text>
        <text x="585" y="142" transform="rotate(18,585,142)">10 GbE</text>
        <text x="748" y="210">XG-PON</text>
        <text x="748" y="378">XG-PON</text>
        <text x="585" y="510" transform="rotate(-10,585,510)">10 GbE</text>
      </g>


      <!-- ═══════════════════════════════════════════
           NODE: SERVIDOR IPERF3  (cx=130, cy=80)
      ═══════════════════════════════════════════ -->
      <g class="node-glow" transform="translate(130,80)">
        <circle cx="0" cy="0" r="42" fill="url(#glow-copper)" />
        <rect x="-32" y="-32" width="64" height="64" rx="10" fill="url(#node-grad)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity=".8"/>
        <!-- icon: server stack -->
        <rect x="-18" y="-20" width="36" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
        <rect x="-18" y="-7"  width="36" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
        <rect x="-18" y="6"   width="36" height="10" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
        <circle cx="12" cy="-15" r="2" fill="#f59e0b"/>
        <circle cx="12" cy="-2"  r="2" fill="#f59e0b" opacity=".5"/>
        <circle cx="12" cy="11" r="2" fill="#f59e0b" opacity=".3"/>
        <!-- label -->
        <text y="50" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="#d97706" letter-spacing="1">SERVIDOR</text>
        <text y="64" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="11" fill="#0891b2" letter-spacing="1">IPERF3</text>
      </g>


      <!-- ═══════════════════════════════════════════
           NODE: SWITCH RAISECOM  (cx=430, cy=205)
      ═══════════════════════════════════════════ -->
      <g class="node-glow" transform="translate(430,205)">
        <circle cx="0" cy="0" r="50" fill="url(#glow-teal)" />
        <rect x="-38" y="-26" width="76" height="52" rx="8" fill="url(#node-grad)" stroke="#00a8cc" stroke-width="1.5" stroke-opacity=".8"/>
        <line x1="-26" y1="-10" x2="26" y2="-10" stroke="#00a8cc" stroke-width="1.2" stroke-opacity=".7"/>
        <line x1="-26" y1="-2"  x2="26" y2="-2"  stroke="#00a8cc" stroke-width="1.2" stroke-opacity=".7"/>
        <line x1="-26" y1="6"   x2="26" y2="6"   stroke="#00a8cc" stroke-width="1.2" stroke-opacity=".7"/>
        <text x="0" y="20" text-anchor="middle" font-size="12" fill="#00a8cc" opacity=".8">⇅</text>
        <text y="38" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="#0891b2" letter-spacing="1">SWITCH RAISECOM</text>
        <text y="52" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="11" fill="#0e7490" letter-spacing="1">10 GbE</text>
      </g>


      <!-- ═══════════════════════════════════════════
           NODE: OLT NOKIA  (cx=720, cy=80)
      ═══════════════════════════════════════════ -->
      <g class="node-glow" transform="translate(720,80)">
        <circle cx="0" cy="0" r="46" fill="url(#glow-teal)" />
        <rect x="-34" y="-34" width="68" height="68" rx="9" fill="url(#olt-grad)" stroke="#0891b2" stroke-width="1.5" stroke-opacity=".9"/>
        <text x="0" y="-8" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="22" font-weight="700" fill="#0891b2" letter-spacing="2">OLT</text>
        <g fill="none" stroke="#0891b2" stroke-width="1.2" opacity=".7">
          <rect x="-22" y="6"  width="8" height="12" rx="1"/>
          <rect x="-9"  y="6"  width="8" height="12" rx="1"/>
          <rect x="4"   y="6"  width="8" height="12" rx="1"/>
          <rect x="17"  y="6"  width="8" height="12" rx="1"/>
        </g>
        <text y="50" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="#0891b2" letter-spacing="1">OLT NOKIA</text>
      </g>


      <!-- ═══════════════════════════════════════════
           NODE: ODN  (cx=720, cy=300)
      ═══════════════════════════════════════════ -->
      <g transform="translate(720,300)">
        <ellipse cx="0" cy="0" rx="58" ry="32" fill="url(#glow-red)"/>
        <polygon points="-52,-22 52,-22 40,22 -40,22" fill="url(#odn-grad)" stroke="#ef4444" stroke-width="1.5" stroke-opacity=".8"/>
        <text x="0" y="7" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="17" font-weight="700" fill="#ef4444" letter-spacing="3">ODN</text>
        <text y="42" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#ef4444" letter-spacing="1">RED DISTRIBUCIÓN</text>
        <text y="55" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" fill="#0891b2" letter-spacing="1">ÓPTICA</text>
      </g>


      <!-- ═══════════════════════════════════════════
           NODE: ONT XS-010X-Q  (cx=720, cy=450)
      ═══════════════════════════════════════════ -->
      <g class="node-glow" transform="translate(720,450)">
        <circle cx="0" cy="0" r="46" fill="url(#glow-teal)" />
        <rect x="-34" y="-34" width="68" height="68" rx="9" fill="url(#node-grad)" stroke="#00a8cc" stroke-width="1.5" stroke-opacity=".9"/>
        <text x="0" y="-8" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="22" font-weight="700" fill="#00a8cc" letter-spacing="2">ONT</text>
        <g fill="none" stroke="#00a8cc" stroke-width="1.2" opacity=".7">
          <rect x="-22" y="6"  width="8" height="12" rx="1"/>
          <rect x="-9"  y="6"  width="8" height="12" rx="1"/>
          <rect x="4"   y="6"  width="8" height="12" rx="1"/>
        </g>
        <text y="50" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="700" fill="#00a8cc" letter-spacing="1">ONT XS-010X-Q</text>
      </g>


      <!-- ═══════════════════════════════════════════
           NODE: CLIENTE IPERF3  (cx=430, cy=545)
      ═══════════════════════════════════════════ -->
      <g class="node-glow" transform="translate(430,545)">
        <circle cx="0" cy="0" r="42" fill="url(#glow-copper)" />
        <rect x="-32" y="-32" width="64" height="64" rx="10" fill="url(#node-grad)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity=".7"/>
        <rect x="-20" y="-18" width="40" height="26" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
        <rect x="-2" y="8" width="4" height="6" rx="1" fill="#f59e0b" opacity=".5"/>
        <line x1="-14" y1="14" x2="14" y2="14" stroke="#f59e0b" stroke-width="2"/>
        <line x1="-14" y1="-10" x2="14" y2="-10" stroke="#f59e0b" stroke-width="1" opacity=".5"/>
        <line x1="-14" y1="-5"  x2="8"  y2="-5"  stroke="#f59e0b" stroke-width="1" opacity=".4"/>
        <text y="44" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="#d97706" letter-spacing="1">CLIENTE</text>
        <text y="58" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="11" fill="#0891b2" letter-spacing="1">IPERF3</text>
      </g>

    </svg>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-line copper"></div>
        <span>Enlace Cobre 10 GbE</span>
      </div>
      <div class="legend-item">
        <div class="legend-line fiber"></div>
        <span>Enlace Fibra Óptica X-GPON</span>
      </div>
    </div>

  </div><!-- /diagram-card -->

</div><!-- /container -->

<!-- FOOTER PERSONALIZADO -->

  <div><strong>Coopelesca - TV Internet</strong></div>
  <div>Proyecto Homologacion X-GPON</div>
  <div>2026 - Todos los derechos reservados</div>
</div>

</body>
</html>
